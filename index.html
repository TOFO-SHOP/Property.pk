<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Property.pk - Find Your Dream Property</title>

  <link rel="stylesheet" href="./assets/css/style.css">
  <link rel="stylesheet" href="./assets/css/home.css">
  <link rel="stylesheet" href="./assets/css/property.css">
  <link rel="stylesheet" href="./assets/css/responsive.css">
</head>
<body>

  <div id="navbar-root"></div>

  <main>
    <section class="hero">
      <div class="hero-inner">
        <span class="hero-eyebrow">Pakistan's Property Marketplace</span>
        <h1>Find Your Next Home, With Confidence</h1>
        <p class="hero-sub">Verified listings across Pakistan's major cities — buy, sell or rent with ease.</p>
      </div>
    </section>

    <div class="container">
      <div class="search-card">
        <form class="search-bar" id="searchForm">
          <input type="text" id="searchInput" placeholder="Search by title, city, or area...">
          <button type="submit" class="btn btn-primary">Search</button>
        </form>

        <div class="search-filters" id="searchFilters">
          <select id="filterCity">
            <option value="">All Cities</option>
          </select>
          <select id="filterType">
            <option value="">All Types</option>
          </select>
          <select id="filterStatus">
            <option value="">Status</option>
          </select>
          <select id="filterBedrooms">
            <option value="">Rooms</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3+</option>
            <option value="4">4+</option>
          </select>
        </div>
      </div>
    </div>

    <div class="container" id="homeSectionsRoot"></div>
  </main>

  <div id="footer-root"></div>

  <script src="./assets/js/utils/constants.js"></script>
  <script src="./assets/js/utils/helpers.js"></script>
  <script src="./assets/js/utils/validator.js"></script>
  <script src="./assets/js/utils/storage.js"></script>

  <script src="./assets/js/api/config.js"></script>
  <script src="./assets/js/api/authApi.js"></script>
  <script src="./assets/js/api/propertyApi.js"></script>
  <script src="./assets/js/api/userApi.js"></script>

  <script src="./assets/js/data/property.js"></script>

  <script src="./assets/js/components/loading.js"></script>
  <script src="./assets/js/components/error.js"></script>
  <script src="./assets/js/components/navbar.js"></script>
  <script src="./assets/js/components/footer.js"></script>

  <script src="./assets/js/pages/home.js"></script>
</body>
    </html>
