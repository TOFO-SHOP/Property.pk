<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Primary SEO -->

  <meta name="description" content="Property.pk par Pakistan bhar ki verified houses, plots aur apartments dhoondein. Ghar, plot ya flat khareedne aur bechne ka aasan tareeqa.">
  <meta name="keywords" content="property in pakistan, houses for sale, plots for sale, apartments, real estate pakistan, property.pk">
  <meta name="author" content="Property.pk">
  <meta name="theme-color" content="#1a56db">

  <!-- Open Graph (WhatsApp / Facebook link preview) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Property.pk - Find Your Dream Property">
  <meta property="og:description" content="Pakistan bhar ki verified properties ek hi jagah. Ghar, plot aur flat khareedein ya bechein.">
  <meta property="og:image" content="./assets/images/og-cover.jpg">
  <meta name="twitter:card" content="summary_large_image">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="./assets/images/favicon.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">

  <!-- Styles -->
  <link rel="stylesheet" href="./assets/css/style.css">
  <link rel="stylesheet" href="./assets/css/home.css">
  <link rel="stylesheet" href="./assets/css/property.css">
  <link rel="stylesheet" href="./assets/css/responsive.css">
</head>
<body>

  <div id="navbar-root"></div>

  <main>
    <section class="hero">
      <div class="hero-inner">
        <h1>Find Homes.<br>Verified Listings.</h1>
        <p class="hero-subtitle">Pakistan bhar ki verified properties ek hi jagah — ghar, plot aur flat khareedein ya bechein.</p>

        <form class="hero-search-bar" id="searchForm">
          <input type="text" id="searchInput" placeholder="Search by title, city, or area..." aria-label="Search properties">
          <button type="submit" aria-label="Search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </button>
        </form>

        <div class="filters-bar">
          <button type="button" id="filtersToggle" class="filters-toggle-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/><circle cx="9" cy="6" r="2" fill="#fff"/><circle cx="15" cy="12" r="2" fill="#fff"/><circle cx="9" cy="18" r="2" fill="#fff"/></svg>
            <span>Filters</span>
          </button>
          <div class="filters-panel" id="filtersPanel">
            <select id="filterCity" aria-label="Filter by city">
              <option value="">All Cities</option>
            </select>
            <select id="filterType" aria-label="Filter by type">
              <option value="">All Types</option>
            </select>
            <select id="filterStatus" aria-label="Filter by status">
              <option value="">Status</option>
            </select>
            <select id="filterRooms" aria-label="Filter by rooms">
              <option value="">Rooms</option>
              <option value="1">1+</option>
              <option value="2">2+</option>
              <option value="3">3+</option>
              <option value="4">4+</option>
              <option value="5">5+</option>
              <option value="6">6+</option>
              <option value="7">7+</option>
              <option value="8">8+</option>
              <option value="9">9+</option>
              <option value="10">10+</option>
            </select>
            <select id="filterFloor" aria-label="Filter by stories">
              <option value="">Stories</option>
              <option value="Single Story">Single Story</option>
              <option value="Double Story">Double Story</option>
              <option value="Triple Story">Triple Story</option>
            </select>
          </div>
        </div>
      </div>
    </section>

    <div class="container" id="homeSectionsRoot"></div>
  </main>

  <div id="footer-root"></div>

  <script src="./assets/js/utils/constants.js"></script>
  <script src="./assets/js/utils/helpers.js"></script>
  <script src="./assets/js/utils/validator.js"></script>
  <script src="./assets/js/utils/storage.js"></script>

  <script src="./assets/js/api/config.js"></script>
  <script src="./assets/js/api/authApi.js"></script>
  <script src="./assets/js/api/propertyApi.js"></script>
  <script src="./assets/js/api/userApi.js"></script>

  <script src="./assets/js/data/property.js"></script>

  <script src="./assets/js/components/loading.js"></script>
  <script src="./assets/js/components/error.js"></script>
  <script src="./assets/js/components/navbar.js"></script>
  <script src="./assets/js/components/footer.js"></script>

  <script src="./assets/js/pages/home.js"></script>
</body>
              </html>
