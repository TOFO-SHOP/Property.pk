<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In - Property.pk</title>
  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="../../assets/css/auth.css">
  <link rel="stylesheet" href="../../assets/css/responsive.css">
</head>
<body class="auth-page">
  <header class="page-header">
    <button class="page-header-back" onclick="window.location.href='../../index.html'" aria-label="Back">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    </button>
    <span class="page-header-title">Log In</span>
  </header>

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">Property.pk</div>
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Log in to manage your listings and saved properties.</p>

      <div id="loginMessage"></div>

      <form class="auth-form" id="loginForm">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="Enter your password" required>
        </div>
        <div class="form-options">
          <label class="checkbox-row" style="align-items:center;">
            <input type="checkbox" id="rememberMe"> Remember me
          </label>
          <a href="./forgot-password.html">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Log In</button>
      </form>

      <p class="auth-footer-link">Don't have an account? <a href="./signup.html">Sign Up</a></p>
    </div>
  </div>

  <script src="../../assets/js/utils/constants.js"></script>
  <script src="../../assets/js/utils/helpers.js"></script>
  <script src="../../assets/js/utils/validator.js"></script>
  <script src="../../assets/js/utils/storage.js"></script>
  <script src="../../assets/js/api/config.js"></script>
  <script src="../../assets/js/api/authApi.js"></script>
  <script src="../../assets/js/pages/auth.js"></script>
</body>
                                                                                                                                                          </html>
