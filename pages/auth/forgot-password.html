<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Property.pk</title>
  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="../../assets/css/auth.css">
  <link rel="stylesheet" href="../../assets/css/responsive.css">
</head>
<body class="auth-page">
  <header class="page-header">
    <button class="page-header-back" onclick="window.location.href='./login.html'" aria-label="Back">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    </button>
    <span class="page-header-title">Reset Password</span>
  </header>

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">Property.pk</div>

      <!-- STEP 1: Enter email -->
      <div class="auth-step active" id="stepEmail">
        <h1 class="auth-title">Forgot Password?</h1>
        <p class="auth-subtitle">Enter your email and we'll send you a verification code.</p>

        <div id="forgotMessage"></div>

        <form class="auth-form" id="forgotForm">
          <div class="form-group">
            <label for="forgotEmail">Email</label>
            <input type="email" id="forgotEmail" placeholder="you@example.com" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block">Send Code</button>
        </form>

        <p class="auth-footer-link">Remembered your password? <a href="./login.html">Log In</a></p>
      </div>

      <!-- STEP 2: OTP -->
      <div class="auth-step" id="stepOtp">
        <h1 class="auth-title">Enter Verification Code</h1>
        <p class="auth-subtitle" id="otpSubtitle">Enter the 6-digit code sent to your email.</p>

        <div id="otpMessage"></div>

        <form id="otpForm">
          <div class="otp-inputs">
            <input type="text" maxlength="1" inputmode="numeric" class="otp-digit">
            <input type="text" maxlength="1" inputmode="numeric" class="otp-digit">
            <input type="text" maxlength="1" inputmode="numeric" class="otp-digit">
            <input type="text" maxlength="1" inputmode="numeric" class="otp-digit">
            <input type="text" maxlength="1" inputmode="numeric" class="otp-digit">
            <input type="text" maxlength="1" inputmode="numeric" class="otp-digit">
          </div>
          <button type="submit" class="btn btn-primary btn-block">Verify Code</button>
        </form>

        <p class="otp-resend">Didn't get the code? <button type="button" id="resendOtpBtn">Resend Code</button></p>
      </div>

      <!-- STEP 3: New password -->
      <div class="auth-step" id="stepReset">
        <h1 class="auth-title">Set New Password</h1>
        <p class="auth-subtitle">Choose a new password for your account.</p>

        <div id="resetMessage"></div>

        <form class="auth-form" id="resetForm">
          <div class="form-group">
            <label for="newPassword">New Password</label>
            <input type="password" id="newPassword" placeholder="Min 8 characters" required>
          </div>
          <div class="form-group">
            <label for="confirmNewPassword">Confirm New Password</label>
            <input type="password" id="confirmNewPassword" placeholder="Re-enter new password" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block">Reset Password</button>
        </form>
      </div>

    </div>
  </div>

  <script src="../../assets/js/utils/constants.js"></script>
  <script src="../../assets/js/utils/helpers.js"></script>
  <script src="../../assets/js/utils/validator.js"></script>
  <script src="../../assets/js/utils/storage.js"></script>
  <script src="../../assets/js/api/config.js"></script>
  <script src="../../assets/js/api/authApi.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="../../assets/js/pages/forgot-password.js"></script>
</body>
          </html>
