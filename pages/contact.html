<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Property.pk</title>

  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/auth.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
</head>
<body>

  <div id="navbar-root"></div>
  <div id="page-header-root"></div>

  <main class="auth-wrapper">
    <div class="auth-card">
      <h2>Contact Us</h2>
      <p style="text-align:center; color:var(--color-text-muted); margin-bottom:var(--spacing-md); font-size:14px;">
        Have a question? Send us a message and we'll get back to you.
      </p>

      <div id="contactFormMessage"></div>

      <form id="contactForm">
        <div class="form-group">
          <label for="contactName">Full Name</label>
          <input type="text" id="contactName" placeholder="Your name">
        </div>
        <div class="form-group">
          <label for="contactEmail">Email</label>
          <input type="email" id="contactEmail" placeholder="Your email">
        </div>
        <div class="form-group">
          <label for="contactMessage">Message</label>
          <input type="text" id="contactMessage" placeholder="How can we help?">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Send Message</button>
      </form>
    </div>
  </main>

  <div id="footer-root"></div>

  <script src="../assets/js/utils/constants.js"></script>
  <script src="../assets/js/utils/helpers.js"></script>
  <script src="../assets/js/utils/validator.js"></script>
  <script src="../assets/js/utils/storage.js"></script>
  <script src="../assets/js/api/config.js"></script>
  <script src="../assets/js/api/authApi.js"></script>
  <script src="../assets/js/components/navbar.js"></script>
  <script src="../assets/js/components/footer.js"></script>
  <script src="../assets/js/components/backButton.js"></script>
  <script>document.addEventListener('DOMContentLoaded', () => renderPageHeader('Contact Us'));</script>

  <script>
    document.getElementById('contactForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const name = document.getElementById('contactName').value.trim();
      const email = document.getElementById('contactEmail').value.trim();
      const message = document.getElementById('contactMessage').value.trim();
      const msgBox = document.getElementById('contactFormMessage');

      if (!isNotEmpty(name) || !isEmail(email) || !isNotEmpty(message)) {
        msgBox.innerHTML = '<p style="color:var(--color-danger); margin-bottom:12px; font-size:14px;">Please fill all fields correctly.</p>';
        return;
      }

      msgBox.innerHTML = '<p style="color:var(--color-success); margin-bottom:12px; font-size:14px;">Message sent — we will get back to you soon.</p>';
      document.getElementById('contactForm').reset();
    });
  </script>
</body>
                                                    </html>
