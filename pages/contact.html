<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Property.pk</title>

  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/home.css">
  <link rel="stylesheet" href="../assets/css/auth.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
</head>

<body>

  <div id="navbar-root"></div>
  <div id="page-header-root"></div>

  <main class="auth-wrapper">

    <div class="auth-card">

      <span class="page-eyebrow">Support</span>

      <h2>Contact Us</h2>

      <p class="auth-subtitle">
        Have a question? Send us a message and we'll get back to you as soon as possible.
      </p>

      <div id="contactFormMessage"></div>

      <form id="contactForm">

        <div class="form-group">
          <label for="contactName">Full Name</label>
          <input
            type="text"
            id="contactName"
            placeholder="Your full name"
            required>
        </div>

        <div class="form-group">
          <label for="contactEmail">Email Address</label>
          <input
            type="email"
            id="contactEmail"
            placeholder="your@email.com"
            required>
        </div>

        <div class="form-group">
          <label for="contactMessage">Message</label>
          <textarea
            id="contactMessage"
            rows="5"
            placeholder="Write your message here..."
            required></textarea>
        </div>

        <button
          type="submit"
          class="btn btn-primary btn-block">
          Send Message
        </button>

      </form>

    </div>

  </main>

  <div id="footer-root"></div>

  <script src="../assets/js/utils/constants.js"></script>
  <script src="../assets/js/utils/helpers.js"></script>
  <script src="../assets/js/utils/validator.js"></script>
  <script src="../assets/js/utils/storage.js"></script>

  <script src="../assets/js/api/config.js"></script>
  <script src="../assets/js/api/authApi.js"></script>

  <script src="../assets/js/components/navbar.js"></script>
  <script src="../assets/js/components/footer.js"></script>
  <script src="../assets/js/components/backButton.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      renderPageHeader("Contact Us");

      const form = document.getElementById("contactForm");
      const msgBox = document.getElementById("contactFormMessage");

      form.addEventListener("submit", function (e) {
        e.preventDefault();

        const name = document.getElementById("contactName").value.trim();
        const email = document.getElementById("contactEmail").value.trim();
        const message = document.getElementById("contactMessage").value.trim();

        if (!isNotEmpty(name) || !isEmail(email) || !isNotEmpty(message)) {
          msgBox.innerHTML =
            '<p class="form-error">Please fill in all fields correctly.</p>';
          return;
        }

        msgBox.innerHTML =
          '<p class="form-success">Your message has been sent successfully. We will contact you soon.</p>';

        form.reset();
      });
    });
  </script>

</body>

</html>
